name: Catalog freshness

# The model catalog is relay's "always looked at" table. This job fails
# when the catalog is inconsistent with the default directive or hasn't
# been reviewed recently, so drift becomes a red X instead of silent
# overcharging.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "defaults/catalog.yaml"
      - "defaults/router.yaml"
      - "defaults/prices.yaml"
      - "scripts/check-catalog.ts"

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - id: check
        run: |
          set -o pipefail
          bun run scripts/check-catalog.ts 2>&1 | tee check-output.txt
      - name: File a review issue when the check fails
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create catalog --color 0e8a16 \
            --description "model catalog maintenance" --force || true
          open=$(gh issue list --repo "$GITHUB_REPOSITORY" --label catalog \
            --state open --json number --jq length)
          if [ "$open" = "0" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Catalog review needed ($(date -u +%Y-%m-%d))" \
              --label catalog \
              --body "$(printf 'The nightly catalog check failed:\n\n```\n%s\n```\n\nMaintenance ritual: see AGENTS.md → "Catalog maintenance". Push the fix to main — installed relays pick it up via `relay update`, no release needed.\n' "$(cat check-output.txt)")"
          fi
