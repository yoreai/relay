name: Release

# Tag pushes build multi-arch binaries (via Bun cross-compile) and attach
# them to a GitHub Release.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile all targets
        run: |
          mkdir -p dist
          for pair in \
            "bun-darwin-arm64:relay-darwin-arm64" \
            "bun-darwin-x64:relay-darwin-x64" \
            "bun-linux-x64:relay-linux-x64" \
            "bun-linux-arm64:relay-linux-arm64"
          do
            target="${pair%%:*}"
            name="${pair##*:}"
            echo "→ $name ($target)"
            bun build --compile --target="$target" ./src/cli.ts --outfile "dist/$name"
          done
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: relay-binaries
          path: dist/relay-*

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: relay-binaries
          path: dist
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/relay-darwin-arm64
            dist/relay-darwin-x64
            dist/relay-linux-x64
            dist/relay-linux-arm64
