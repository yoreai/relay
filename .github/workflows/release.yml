name: Release

# Tag pushes build multi-arch binaries and attach them to a GitHub Release.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            name: relay-darwin-arm64
            target: bun-darwin-arm64
          - runner: macos-13
            name: relay-darwin-x64
            target: bun-darwin-x64
          - runner: ubuntu-latest
            name: relay-linux-x64
            target: bun-linux-x64
          - runner: ubuntu-24.04-arm
            name: relay-linux-arm64
            target: bun-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile
        run: |
          bun build --compile --target=${{ matrix.target }} ./src/cli.ts \
            --outfile dist/${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/relay-darwin-arm64
            dist/relay-darwin-x64
            dist/relay-linux-x64
            dist/relay-linux-arm64
