<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bold route-choice mark — readable at 16px -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- alternate path (dim but thick) -->
  <path d="M14 16 L20 8 H26" fill="none" stroke="#6b7280" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="26" cy="8" r="3" fill="#e5e7eb"/>

  <!-- chosen path (lit) -->
  <path d="M4 16 H26" fill="none" stroke="#39ff14" stroke-width="3.4"
        stroke-linecap="round"/>
  <circle cx="4" cy="16" r="3.2" fill="#39ff14"/>
  <circle cx="14" cy="16" r="3.6" fill="#0a0a0a" stroke="#39ff14" stroke-width="2.6"/>
  <circle cx="26" cy="16" r="3.2" fill="#39ff14"/>
</svg>
