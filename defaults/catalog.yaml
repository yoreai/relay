# relay model catalog — the "always looked at" table.
# Facts only: what exists, what it costs, what quality class it sits in,
# and which backend CLIs can serve it. Routing POLICY stays in router.yaml;
# `relay advise` proposes policy changes from these facts, never applies
# them silently.
#
# classes are ordered weakest → strongest. A model's class is its quality
# bar: advise only ever suggests swaps WITHIN a class.
version: 1
updated: "2026-07-24"
classes: [nano, cheap, workhorse, opus-class, frontier]
models:
  gpt-5.6-luna:
    class: nano
    in: 1.0
    out: 6.0
    cache_read: 0.10
    backends: [cursor, codex]
  gemini-3-flash:
    class: cheap
    fast: true
    in: 0.30
    out: 2.50
    backends: [gemini, cursor]
  haiku-4.5:
    class: cheap
    in: 0.80
    out: 4.0
    cache_read: 0.08
    backends: [claude]
  glm-5.2:
    # promoted cheap → workhorse 2026-07-23: 62.1 SWE-bench Pro (> gpt-5.5,
    # open-weights leader), ≈opus-4.8 on FrontierSWE/Terminal-Bench
    class: workhorse
    in: 1.40
    out: 4.40
    cache_read: 0.26
    backends: [cursor]
  composer-2.5:
    class: workhorse
    fast: true
    in: 0.90
    out: 3.60
    backends: [cursor]
  grok-4.5:
    class: workhorse
    in: 2.0
    out: 6.0
    cache_read: 0.50
    backends: [cursor, grok]
  grok-4.5-fast:
    class: workhorse
    fast: true
    in: 4.0
    out: 18.0
    backends: [cursor, grok]
  sonnet-5:
    class: workhorse
    in: 3.0
    out: 15.0
    cache_read: 0.30
    backends: [claude, cursor]
  gemini-3.1-pro:
    class: opus-class
    in: 2.50
    out: 15.0
    backends: [gemini, cursor]
  opus-4.8-high:
    class: opus-class
    in: 5.0
    out: 25.0
    cache_read: 0.50
    backends: [cursor, claude]
  gpt-5.6-sol:
    class: opus-class
    in: 5.0
    out: 30.0
    backends: [cursor, codex]
  opus-5:
    # frontier on evidence, not vibes (2026-07-24): within 0.5pp of fable-5 on
    # CursorBench 3.2 at max effort for ~half the cost per task, 3x the
    # next-best on ARC-AGI-3, and clears fable-5's OSWorld 2.0 peak on ~1/3 the
    # budget — at opus-4.8's unchanged rate card. Supersedes opus-4.8-high:
    # same price, strictly better, so nothing should route to 4.8 by choice.
    class: frontier
    in: 5.0
    out: 25.0
    cache_read: 0.50
    supersedes: [opus-4.8-high]
    backends: [cursor, claude]
  kimi-k2.7-code:
    # demoted frontier → workhorse 2026-07-24. It was the cheapest thing in the
    # frontier class, so advise kept proposing it as a fable-5 replacement for
    # the deep tier on price alone. The class never held up: every published
    # K2.7 number is a Moonshot-proprietary suite (no independent SWE-bench,
    # Terminal-Bench or LiveCodeBench results exist), and on Moonshot's OWN
    # table it trails opus-4.8 — our opus-class marker — on Kimi Code Bench v2
    # (62.0 vs 67.4), Program Bench (53.6 vs 63.8) and MCP Atlas (76.0 vs 81.3).
    # Below the opus-class marker means below opus-class. Revisit if audited
    # public-suite numbers land.
    class: workhorse
    in: 1.0
    out: 4.0
    backends: [cursor, kimi]
  fable-5-high:
    # note: the claude API gates fable-5 behind data retention being enabled,
    # so `claude --model claude-fable-5` 400s on ZDR workspaces. relay pins the
    # model rather than silently substituting one — you get a clear error, and
    # the deep tier reaches opus-5 first anyway.
    class: frontier
    in: 10.0
    out: 50.0
    cache_read: 1.0
    backends: [cursor, claude]
