# relay model catalog — the "always looked at" table.
# Facts only: what exists, what it costs, what quality class it sits in,
# and which backend CLIs can serve it. Routing POLICY stays in router.yaml;
# `relay advise` proposes policy changes from these facts, never applies
# them silently.
#
# classes are ordered weakest → strongest. A model's class is its quality
# bar: advise only ever suggests swaps WITHIN a class.
